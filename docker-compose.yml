version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend

  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace-data:/data/workspaces
      - memory-data:/data/memory
      - ./.data:/app/.data
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    env_file: .env

volumes:
  workspace-data:
  memory-data:
